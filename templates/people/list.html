<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Members</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <h1 class="h3 mb-1">Family Members</h1>
                <p class="text-secondary mb-0">People who own imported statement lines.</p>
            </div>

            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-secondary">Home</a>
                <a href="/people/create" class="btn btn-primary">Add Person</a>
            </div>
        </div>

        {% if people %}
        <div class="table-responsive bg-white border rounded">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for person in people %}
                    <tr>
                        <td>{{ person.props.name }}</td>
                        <td>
                            <div class="d-flex justify-content-end gap-2">
                                <a href="/people/{{ person.id }}/edit" class="btn btn-sm btn-outline-primary">
                                    Edit
                                </a>
                                <form method="post" action="/people/{{ person.id }}/delete">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="bg-white border rounded p-4 text-center">
            <p class="text-secondary mb-3">No family members have been added yet.</p>
            <a href="/people/create" class="btn btn-primary">Add Person</a>
        </div>
        {% endif %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
