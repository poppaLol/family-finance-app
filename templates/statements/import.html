<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Statement CSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <div class="d-flex align-items-center justify-content-between">
                            <h1 class="h3 mb-0">Import Statement CSV</h1>
                            <a href="/" class="btn btn-sm btn-outline-secondary">Home</a>
                        </div>
                    </div>

                    <div class="card-body">
                        {% if errors %}
                        <div class="alert alert-danger">
                            <h2 class="h6">Import failed</h2>
                            <ul class="mb-0">
                                {% for error in errors %}
                                <li>{{ error }}</li>
                                {% endfor %}
                            </ul>
                        </div>
                        {% endif %}

                        {% if people %}
                        <form method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="person_id" class="form-label">Family Member</label>
                                <select class="form-select" id="person_id" name="person_id" required>
                                    <option value="">Choose a family member</option>
                                    {% for person in people %}
                                    <option value="{{ person.id }}">{{ person.props.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="file" class="form-label">Statement CSV</label>
                                <input class="form-control" id="file" name="file" type="file" accept=".csv,text/csv"
                                    required>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/statements" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Import Lines</button>
                            </div>
                        </form>
                        {% else %}
                        <div class="alert alert-info">
                            Add a family member before importing a statement CSV.
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/statements" class="btn btn-outline-secondary">Cancel</a>
                            <a href="/people/create" class="btn btn-primary">Add Person</a>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
