<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Statement CSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h1 class="h3 mb-0">Import Statement CSV</h1>
                    </div>

                    <div class="card-body">
                        {% if errors %}
                        <div class="alert alert-danger">
                            <h2 class="h6">Import failed</h2>
                            <ul class="mb-0">
                                {% for error in errors %}
                                <li>{{ error }}</li>
                                {% endfor %}
                            </ul>
                        </div>
                        {% endif %}

                        <form method="post" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label for="file" class="form-label">Statement CSV</label>
                                <input class="form-control" id="file" name="file" type="file" accept=".csv,text/csv"
                                    required>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/statements" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">Import Lines</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
